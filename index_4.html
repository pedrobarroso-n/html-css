<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/icons8-4-key-48.png" type="image/x-icon">
    <title>Estudo de html e css</title>
    <style>
        iframe{
            padding: 10px;
        }
        iframe#tela{
            width: 96vw;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>Iframes e Formularios</h1>
    <h4><a href="index_3.html"> |<<| Voltar para a anterior</a></h4>
    <hr>
    <h3>Iframe em uso:</h3>
    <iframe src="https://pedrobarroso-n.github.io/html-css/" frameborder="1" >
        <!--configuraçoes de width/height na CSS sao as oq predomina/nao por tabelas em iframe-->
        <!--frameborder so dar pra usar 0 ou 1, usar css para personalizar-->
    </iframe>
    <iframe src="pag_3.html" frameborder="0" width="250px" scolling="auto">
        <p>Seu navegador nao e compativel</p> <!--caso nao carregue, alguns navegadores de celular nao suportam-->
        <!--scolling - auto(padrao) yes(da barra de rolagem mesmo q caiba) no(nao da barra de rolagem mesmo q precise)-->
    </iframe>
    <h3>Acesso pelo iframe:</h3>
    <ul>
        <li><a href="desafio_MOD III/002/index.html" target="frame">Abrir pagina I</a></li>
        <li><a href="desafio_MOD III/003/index.html" target="frame">Abrir pagina II</a></li>
    </ul>
    <iframe  id="tela" name="frame" srcdoc="<h2>Escolha um dos links acima !!!</h2><img src='imgs/img5.png' width='350px'>">
        <!--srcdoc permite criar o conteudo estatico com tags ou com o src normal pode criar um arquivo para isso-->
        <!--name para o link abrir no iframe ao inves de fora da pagina-->
    </iframe> 
    <h3>Iframe seguro:</h3>
    <iframe src="form_test.html" frameborder="1" sandbox="allow-same-origin, allow-forms, allow-scripts" referrerpolicy="no-referrer">
        Seu navegador não é compativel...
        <!--sandbox bloqueia o acesso a certas coisas do iframe, permintindo certas coisas-->
        <!--referrerpolicy o iframe nao coletara dados do usuario-->
    </iframe>
    <br>
    <iframe src="jv.html" referrerpolicy="no-referrer" sandbox="allow-scripts">
        <!--usando o sandbox e o referrerpolicy podemos liberar o acesso apenas a certos funçoes-->
    </iframe>
    <h3>Utilidades do iframe:</h3>
    <ul>
        <li>Por Mapas</li>
        <li>Por Videos</li>
        <li>Por Planilhas/Documentos</li>
        <li>Por Apresentações</li>
    </ul>
    <a href="https://youtu.be/dzhJsc1YszU" target="_blank">Ver como</a>
</body>
</html>
