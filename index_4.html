<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/icons8-4-key-48.png" type="image/x-icon">
    <title>Estudo de html e css</title>
    <style>
        iframe{
            padding: 10px;
        }
        iframe#tela{
            width: 96vw;
            height: 300px;
        }
        form{
            border: 1px solid black;
            padding-left: 15px;
            width: 250px;
        }
    </style>
</head>
<body>
    <h1>Iframes e Formularios</h1>
    <h4><a href="index_3.html"> |<<| Voltar para a anterior</a></h4>
    <hr>
    <h3>Iframe em uso:</h3>
    <iframe src="https://pedrobarroso-n.github.io/html-css/" frameborder="1" >
        <!--configuraçoes de width/height na CSS sao as oq predomina/nao por tabelas em iframe-->
        <!--frameborder so dar pra usar 0 ou 1, usar css para personalizar-->
    </iframe>
    <iframe src="pag_3.html" frameborder="0" width="250px" scolling="auto">
        <p>Seu navegador nao e compativel</p> <!--caso nao carregue, alguns navegadores de celular nao suportam-->
        <!--scolling - auto(padrao) yes(da barra de rolagem mesmo q caiba) no(nao da barra de rolagem mesmo q precise)-->
    </iframe>
    <h3>Acesso pelo iframe:</h3>
    <ul>
        <li><a href="desafio_MOD III/002/index.html" target="frame">Abrir pagina I</a></li>
        <li><a href="desafio_MOD III/003/index.html" target="frame">Abrir pagina II</a></li>
    </ul>
    <iframe  id="tela" name="frame" srcdoc="<h2>Escolha um dos links acima !!!</h2><img src='imgs/img5.png' width='350px'>">
        <!--srcdoc permite criar o conteudo estatico com tags ou com o src normal pode criar um arquivo para isso-->
        <!--name para o link abrir no iframe ao inves de fora da pagina-->
    </iframe> 
    <h3>Iframe seguro:</h3>
    <iframe src="form_test.html" frameborder="1" sandbox="allow-same-origin, allow-forms, allow-scripts" referrerpolicy="no-referrer">
        Seu navegador não é compativel...
        <!--sandbox bloqueia o acesso a certas coisas do iframe, permintindo certas coisas-->
        <!--referrerpolicy o iframe nao coletara dados do usuario-->
    </iframe>
    <br>
    <iframe src="jv.html" referrerpolicy="no-referrer" sandbox="allow-scripts">
        <!--usando o sandbox e o referrerpolicy podemos liberar o acesso apenas a certos funçoes-->
    </iframe>
    <h3>Utilidades do iframe:</h3>
    <ul>
        <li>Por Mapas</li>
        <li>Por Videos</li>
        <li>Por Planilhas/Documentos</li>
        <li>Por Apresentações</li>
        <li><a href="https://youtu.be/dzhJsc1YszU" target="_blank">!! Ver como !!</a></li>
    </ul>
    <h3>Formularios em uso:</h3>
    <form action="cadastro.php" method="post" autocomplete="on"> 
        <!--autocomplete="off" nao poe aqueles registros abaixo da caixa-->
        <!--method="get" para dados não sensiveis (URL compartilhavel)-->
        <!--method="post" ocultar dados a usuarios padrao, enviar arquivos maiores-->
        <p>
            <label for="nome">Usuario</label> 
            <input type="text" name="nome" id="nome" required maxlength="20" placeholder="digite um nome" autocomplete="username"> 
            <!--name mais util a html e php / id mais util pra outras linguagens-->
        </p> 
        <p>
            <label for="idade">Aniversario</label>
            <input type="date" name="nascimento" id="nascimento" size="10">
        </p>
        <p>
            <label for="nota">Nota escolar</label>
            <input type="number" name="nota" id="nota" min="0" max="10" placeholder="digite sua ultima nota" step="0.1">
            <!--step="0.1" permite valores com virgula-->
        </p>
        <p>
            <label for="hora">Periodo de estudo</label>
            <input type="time" name="hora" id="hora" value="07:00">
            <!--com o value pode por um valor padrao da informacao-->
        </p>
        <p>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required autocomplete="email" placeholder="digite seu email">
            <!--autocomplete - so funciona se o autocomplete do form tiver em "on"-->
            <!--required - torna obrigatorio de preencher-->
        </p>
        <p>
            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" size="10" required minlength="6" maxlength="10" autocomplete="current-password" placeholder="digite a senha">
            <!--minlength - minimo de caracteres/maxlength - maximo de caracteres-->
            <!--size - quantos caracteres mostrará a caixa-->
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form> <!--algumas funçoes nao funcionam corretamente em alguns browsers-->
</body>
</html>
