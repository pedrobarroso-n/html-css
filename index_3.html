<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/icons8-3-key-48.png" type="image/x-icon">
    <title>Estudo de html e css</title>
    <style>
        div.quadrado{
            border: 1px solid black;
            width: 300px;
            height: 300px;
            display: inline-block;
        }
        div#q1{
            background-color: lightgreen;
        }
        div#q2{
            background-image: linear-gradient(orange,red);
        }
        div#q3{
            background-image: url(imgs/pattern001.png);
        }
        div#big{
            height: 300px;
            width: 915px;
            padding: 20px;
            background-image: url(imgs/wallpaper001.jpg);
        }
        div#big2{
            background-image: url(https://gustavoguanabara.github.io/html-css/imagens/mascote.png);
            background-size: 50px 50px;     /*tamanho de cada imagem da malha (mascote do curso em video)*/
            background-repeat: repeat;      /*repetir ou nao, em qual eixo x ou y*/
            margin-top: 30px;
            width: 955px;
            height: 200px;
        }
        div.bloco{
            height: 170px;
            width: 48%;
            margin: auto;
            border: 2px dashed black;
            margin-bottom: 10px;
            border-radius: 10px;
            background-image: url(imgs/wallpaper003.jpg);
        }
        div#q4{
            background-position: left top;
        }
        div#q5{
            background-position: left bottom;
        }
        div#q6{
            background-position: right bottom;
        }
        div#q7{
            background-position: right top;
        }
        div#q8{
            background-position: center center;
        }
        #alinhar{
            text-align: center;
        }
        p#link{
            text-align: center;
            width: 200px;
            margin: auto;
            padding: 15px 0px;
            outline: darkblue dashed;
            font-size: 1.2em;
        }
        section#contem{
            height: 300px;
            padding: 10px;
            position: relative;
            background-color: aqua;
            background-image: url(imgs/target001.png);
            background-size: 100% 100%;
        }
        article#contido{
            height: 200px;
            width: 350px;
            position: absolute;
            background-color: blueviolet;
            background-image: url(imgs/target001.png);
            background-size: 100% 100%;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <h1>Imagens de Fundo</h1>
    <h4><a href="index_2.html"> |<<| Voltar para a anterior</a></h4>
    <hr>
    <h3>Por imagens no fundo:</h3>
    <div id="big">  
        <div class="quadrado" id="q1"></div>
        <div class="quadrado" id="q2"></div>
        <div class="quadrado" id="q3"></div>
    </div>
    <div id="big2"></div>
    <h3>Posicionamento de imagem:</h3>
    <div class="bloco" id="q4"></div>
    <div class="bloco" id="q5"></div>
    <div class="bloco" id="q6"></div>
    <div class="bloco" id="q7"></div>
    <div class="bloco" id="q8"></div>
    <p id="alinhar">*por padrão vem left-top*</p>
    <h3>Tratamento de Imagens no fundo:</h3>
    <p id="link"><a href="pag_4.html">Ver Exemplo</a></p>
    <h3>Centralização Vertical de caixas:</h3>
    <section id="contem"><article id="contido"></article></section>
    <h3>Tabelas no html:</h3>
</body>
</html>
